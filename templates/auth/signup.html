{% extends "base.html" %}

{% block title %}Sign Up - Adaptive Quiz Generator{% endblock %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center min-vh-100 py-4">
    <div class="row w-100 justify-content-center">
        <div class="col-11 col-sm-9 col-md-7 col-lg-5 col-xl-4">
            <!-- Card with gradient border -->
            <div class="card shadow-xl border-0" style="position: relative; overflow: hidden;">
                <!-- Gradient accent top -->
                <div style="position: absolute; top: 0; left: 0; right: 0; height: 5px; background: linear-gradient(90deg, #10b981, #06b6d4, #6366f1);"></div>
                
                <div class="card-body p-5">
                    <!-- Icon & Header -->
                    <div class="text-center mb-5">
                        <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3" style="width:80px; height:80px; background: linear-gradient(135deg, #ccfbf1 0%, #a7f3d0 100%); border: 2px solid #a7f3d0;">
                            <i class="bi bi-person-plus-fill fs-1" style="color: #10b981;"></i>
                        </div>
                        <h2 class="fw-bold mb-2" style="color: #1f2937; font-size: 1.75rem;">Create Account</h2>
                        <p class="text-muted mb-0">Join and start learning smarter</p>
                    </div>
                    
                    <!-- Signup Form -->
                    <form method="POST" action="{{ url_for('auth.signup') }}" novalidate>
                        <!-- Full Name -->
                        <div class="mb-4">
                            <label for="name" class="form-label">Full Name</label>
                            <div class="input-group">
                                <span class="input-group-text border-end-0">
                                    <i class="bi bi-person" style="color: #10b981;"></i>
                                </span>
                                <input type="text" class="form-control border-start-0" id="name" name="name" 
                                       placeholder="John Doe" required 
                                       style="background: #f9fafb;">
                            </div>
                        </div>
                        
                        <!-- Email -->
                        <div class="mb-4">
                            <label for="email" class="form-label">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text border-end-0">
                                    <i class="bi bi-envelope" style="color: #10b981;"></i>
                                </span>
                                <input type="email" class="form-control border-start-0" id="email" name="email" 
                                       placeholder="you@example.com" required 
                                       style="background: #f9fafb;">
                            </div>
                        </div>
                        
                        <!-- Password -->
                        <div class="mb-4">
                            <label for="password" class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text border-end-0">
                                    <i class="bi bi-lock-fill" style="color: #10b981;"></i>
                                </span>
                                <input type="password" class="form-control border-start-0" id="password" name="password" 
                                       placeholder="Min 6 characters" required minlength="6" 
                                       style="background: #f9fafb;">
                            </div>
                        </div>
                        
                        <!-- Confirm Password -->
                        <div class="mb-4">
                            <label for="confirm_password" class="form-label">Confirm Password</label>
                            <div class="input-group">
                                <span class="input-group-text border-end-0">
                                    <i class="bi bi-shield-lock" style="color: #10b981;"></i>
                                </span>
                                <input type="password" class="form-control border-start-0" id="confirm_password" 
                                       name="confirm_password" placeholder="Re-enter password" required 
                                       style="background: #f9fafb;">
                            </div>
                        </div>
                        
                        <!-- Role Selection -->
                        <div class="mb-4">
                            <label class="form-label">I am a:</label>
                            <div class="row g-2">
                                <div class="col-6">
                                    <div class="form-check" style="padding: 12px; border: 1.5px solid #d1d5db; border-radius: 0.5rem; transition: all 0.25s;">
                                        <input class="form-check-input" type="radio" name="role" 
                                               id="role_student" value="student" checked>
                                        <label class="form-check-label" for="role_student">
                                            <i class="bi bi-mortarboard" style="color: #6366f1;"></i> 
                                            <span class="fw-600">Student</span>
                                        </label>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="form-check" style="padding: 12px; border: 1.5px solid #d1d5db; border-radius: 0.5rem; transition: all 0.25s;">
                                        <input class="form-check-input" type="radio" name="role" 
                                               id="role_instructor" value="instructor">
                                        <label class="form-check-label" for="role_instructor">
                                            <i class="bi bi-briefcase" style="color: #6366f1;"></i> 
                                            <span class="fw-600">Instructor</span>
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Terms & Conditions -->
                        <div class="mb-4">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="terms" name="terms" required>
                                <label class="form-check-label" for="terms">
                                    I agree to the <a href="#" style="color: #6366f1; text-decoration: none;">Terms of Service</a> and <a href="#" style="color: #6366f1; text-decoration: none;">Privacy Policy</a>
                                </label>
                            </div>
                        </div>
                        
                        <!-- Submit Button -->
                        <button type="submit" class="btn btn-success btn-lg w-100 mb-3" style="background: linear-gradient(135deg, #0d9488, #14b8a6) !important;">
                            <i class="bi bi-person-plus"></i> Create Account
                        </button>
                    </form>
                    
                    <!-- Divider -->
                    <div class="position-relative mb-4">
                        <hr class="my-0">
                        <span class="position-absolute top-50 start-50 translate-middle bg-white px-2" style="color: #9ca3af; font-size: 0.85rem;">OR</span>
                    </div>
                    
                    <!-- Login Link -->
                    <div class="text-center">
                        <p class="text-muted mb-0">
                            Already have an account? 
                            <a href="{{ url_for('auth.login') }}" class="fw-bold text-primary" style="text-decoration: none;">
                                Sign in
                            </a>
                        </p>
                    </div>
                </div>
            </div>
            
            <!-- Info Box -->
            <div class="mt-4 p-3 rounded-lg" style="background: linear-gradient(135deg, rgba(16,185,129,0.08) 0%, rgba(6,182,212,0.08) 100%); border-left: 4px solid #10b981;">
                <small class="text-muted">
                    <i class="bi bi-info-circle-fill" style="color: #10b981;"></i> 
                    Create your account and start learning with adaptive quizzes
                </small>
            </div>
        </div>
    </div>
</div>

<style>
    .min-vh-100 { min-height: 100vh; }
    
    .card {
        border-radius: 1.25rem !important;
        background: rgba(255,255,255,0.98);
    }
    
    .text-primary { color: #6366f1 !important; }
    .fw-600 { font-weight: 600; }
    
    .rounded-lg { border-radius: 0.75rem; }
    
    .form-check:has(#role_student:checked),
    .form-check:has(#role_instructor:checked) {
        background: linear-gradient(135deg, #f0f9ff 0%, #ecfdf5 100%) !important;
        border-color: #6366f1 !important;
        border-width: 2px !important;
    }
</style>
{% endblock %}
