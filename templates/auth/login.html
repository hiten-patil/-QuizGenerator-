{% extends "base.html" %}

{% block title %}Login - Adaptive Quiz Generator{% endblock %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center min-vh-100 py-4">
    <div class="row w-100 justify-content-center">
        <div class="col-11 col-sm-9 col-md-7 col-lg-5 col-xl-4">
            <!-- Card with gradient border effect -->
            <div class="card shadow-xl border-0" style="position: relative; overflow: hidden;">
                <!-- Gradient accent top -->
                <div style="position: absolute; top: 0; left: 0; right: 0; height: 5px; background: linear-gradient(90deg, #6366f1, #06b6d4, #10b981);"></div>
                
                <div class="card-body p-5">
                    <!-- Icon & Header -->
                    <div class="text-center mb-5">
                        <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3" style="width:80px; height:80px; background: linear-gradient(135deg, #eef2ff 0%, #cffafe 100%); border: 2px solid #c7d2fe;">
                            <i class="bi bi-person-fill fs-1" style="color: #6366f1;"></i>
                        </div>
                        <h2 class="fw-bold mb-2" style="color: #1f2937; font-size: 1.75rem;">Welcome Back</h2>
                        <p class="text-muted mb-0">Sign in to your account to continue</p>
                    </div>
                    
                    <!-- Login Form -->
                    <form method="POST" action="{{ url_for('auth.login') }}" novalidate>
                        <!-- Email Input -->
                        <div class="mb-4">
                            <label for="email" class="form-label">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text border-end-0">
                                    <i class="bi bi-envelope" style="color: #6366f1;"></i>
                                </span>
                                <input type="email" class="form-control border-start-0" id="email" name="email" 
                                       placeholder="you@example.com" required 
                                       style="background: #f9fafb;">
                            </div>
                        </div>
                        
                        <!-- Password Input -->
                        <div class="mb-2">
                            <label for="password" class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text border-end-0">
                                    <i class="bi bi-lock-fill" style="color: #6366f1;"></i>
                                </span>
                                <input type="password" class="form-control border-start-0" id="password" name="password" 
                                       placeholder="Enter your password" required 
                                       style="background: #f9fafb;">
                            </div>
                        </div>
                        
                        <!-- Remember Me & Forgot Password -->
                        <div class="row align-items-center mb-4">
                            <div class="col">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input" id="remember" name="remember">
                                    <label class="form-check-label" for="remember">
                                        Remember me
                                    </label>
                                </div>
                            </div>
                            <div class="col-auto">
                                <a href="{{ url_for('auth.forgot_password') }}" class="text-primary fw-600 small">
                                    Forgot password?
                                </a>
                            </div>
                        </div>
                        
                        <!-- Submit Button -->
                        <button type="submit" class="btn btn-primary btn-lg w-100 mb-4">
                            <i class="bi bi-box-arrow-in-right"></i> Sign In
                        </button>
                    </form>
                    
                    <!-- Divider -->
                    <div class="position-relative mb-4">
                        <hr class="my-0">
                        <span class="position-absolute top-50 start-50 translate-middle bg-white px-2" style="color: #9ca3af; font-size: 0.85rem;">OR</span>
                    </div>
                    
                    <!-- Sign Up Link -->
                    <div class="text-center">
                        <p class="text-muted mb-0">
                            Don't have an account? 
                            <a href="{{ url_for('auth.signup') }}" class="fw-bold text-primary" style="text-decoration: none;">
                                Create one
                            </a>
                        </p>
                    </div>
                </div>
            </div>
            
            <!-- Info Box -->
            <div class="mt-4 p-3 rounded-lg" style="background: linear-gradient(135deg, rgba(99,102,241,0.08) 0%, rgba(6,182,212,0.08) 100%); border-left: 4px solid #6366f1;">
                <small class="text-muted">
                    <i class="bi bi-info-circle-fill" style="color: #6366f1;"></i> 
                    Use your registered email and password to login
                </small>
            </div>
        </div>
    </div>
</div>

<style>
    .min-vh-100 { min-height: 100vh; }
    
    .card {
        border-radius: 1.25rem !important;
        background: rgba(255,255,255,0.98);
    }
    
    .text-primary { color: #6366f1 !important; }
    .fw-600 { font-weight: 600; }
    
    .rounded-lg { border-radius: 0.75rem; }
</style>
{% endblock %}
